<svg width="820" height="320" viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="820" height="320" fill="#f8fafc"/>

  <!-- ── PLAN MODE ── -->
  <rect x="20" y="20" width="520" height="280" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="20" width="520" height="46" rx="14" fill="#1d4ed8"/>
  <rect x="20" y="52" width="520" height="14" fill="#1d4ed8"/>
  <text x="280" y="49" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">PLAN MODE</text>

  <!-- Nodo: Tú -->
  <circle cx="135" cy="175" r="55" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="135" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#1e3a8a">Tú</text>
  <text x="135" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">Product Owner</text>

  <!-- Nodo: Claude Code -->
  <circle cx="415" cy="175" r="55" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="415" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Claude</text>
  <text x="415" y="187" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Code</text>
  <text x="415" y="206" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">Developer</text>

  <!-- Flecha: Tú → Claude (arriba) -->
  <line x1="191" y1="157" x2="358" y2="157" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="275" y="147" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">propones / ajustas</text>

  <!-- Flecha: Claude → Tú (abajo) -->
  <line x1="360" y1="193" x2="192" y2="193" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="275" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">propone / adapta</text>

  <!-- Texto loop -->
  <text x="280" y="272" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">↺  loop de feedback</text>

  <!-- ── Transición ── -->
  <line x1="545" y1="170" x2="608" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#a3)"/>
  <rect x="544" y="182" width="68" height="22" rx="11" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="578" y="197" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#15803d">✓ Plan listo</text>

  <!-- ── EDIT MODE ── -->
  <rect x="615" y="20" width="185" height="280" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="615" y="20" width="185" height="46" rx="14" fill="#15803d"/>
  <rect x="615" y="52" width="185" height="14" fill="#15803d"/>
  <text x="707" y="49" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">EDIT MODE</text>

  <!-- Nodo: Claude Code (solo) -->
  <circle cx="707" cy="175" r="55" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="707" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#166534">Claude</text>
  <text x="707" y="187" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#166534">Code</text>

  <text x="707" y="262" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#4ade80">ejecuta el plan</text>
</svg>
